spring.application.name=reimbursement
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_db
spring.datasource.username=${DB_USERNAME:your_db_username}
spring.datasource.password=${DB_PASSWORD:your_db_password}

# Hibernate auto create/update tables ?
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries
spring.jpa.show-sql=true

# Format SQL (optional)
spring.jpa.properties.hibernate.format_sql=true

# Recommended defaults for APIs
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# JWT settings
app.jwt.secret=${APP_JWT_SECRET:replace_with_secure_jwt_secret}
app.jwt.expiration-ms=86400000
